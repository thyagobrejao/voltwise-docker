# =============================================================================
# VoltWise — Nginx Reverse Proxy Configuration
#
# Routes:
#   /api/   → voltwise-cloud (Django/Gunicorn, port 8000)
#   /admin/ → voltwise-cloud (Django admin)
#   /ocpp/  → voltwise-ocpp  (Go WebSocket server, port 8080)
#
# WebSocket upgrade is applied on /ocpp/ routes.
# Port 443 block is a placeholder — add SSL certificates to activate.
# =============================================================================

worker_processes auto;

events {
    worker_connections 1024;
}

http {
    # Don't leak Nginx version in error pages and headers
    server_tokens off;

    # Shared maps for WebSocket upgrade support
    map $http_upgrade $connection_upgrade {
        default upgrade;
        ''      close;
    }

    # ── Upstreams ─────────────────────────────────────────────────────────────
    upstream cloud {
        server cloud:8000;
        keepalive 32;
    }

    upstream ocpp {
        server ocpp:8080;
        keepalive 32;
    }

    # ── HTTP (port 80) ────────────────────────────────────────────────────────
    server {
        listen 80;
        server_name _;

        # -- Django REST API ---------------------------------------------------
        location /api/ {
            proxy_pass         http://cloud;
            proxy_http_version 1.1;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_set_header   Connection        "";
            proxy_read_timeout 60s;
        }

        # -- Django Admin ------------------------------------------------------
        location /admin/ {
            proxy_pass         http://cloud;
            proxy_http_version 1.1;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_set_header   Connection        "";
            proxy_read_timeout 60s;
        }

        # -- OCPP WebSocket (chargers connect here) ----------------------------
        # Chargers connect as: ws://host/ocpp/<charger-id>
        # The voltwise-ocpp service handles the /ocpp/ prefix natively.
        location /ocpp/ {
            proxy_pass          http://ocpp;
            proxy_http_version  1.1;

            # WebSocket upgrade headers
            proxy_set_header    Upgrade           $http_upgrade;
            proxy_set_header    Connection        $connection_upgrade;

            proxy_set_header    Host              $host;
            proxy_set_header    X-Real-IP         $remote_addr;
            proxy_set_header    X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header    X-Forwarded-Proto $scheme;

            # Long timeouts — OCPP connections are long-lived
            proxy_read_timeout  3600s;
            proxy_send_timeout  3600s;
        }

        # -- Health check (used by Docker and load balancers) ------------------
        location /healthz {
            proxy_pass http://ocpp;
        }

        # Default: 404 for any unmatched path
        location / {
            return 404;
        }
    }

    # ── HTTPS (port 443) ──────────────────────────────────────────────────────
    # Uncomment and configure after adding SSL certificates.
    # For Let's Encrypt: use certbot or the caddy image as an alternative.
    #
    # server {
    #     listen 443 ssl http2;
    #     server_name yourdomain.com;
    #
    #     ssl_certificate     /etc/nginx/certs/fullchain.pem;
    #     ssl_certificate_key /etc/nginx/certs/privkey.pem;
    #     ssl_protocols       TLSv1.2 TLSv1.3;
    #     ssl_ciphers         HIGH:!aNULL:!MD5;
    #
    #     # Same location blocks as HTTP server above
    #     # ...
    # }
}
