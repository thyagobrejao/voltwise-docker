# =============================================================================
# VoltWise — Docker Compose
#
# Usage:
#   cp .env.example .env      # configure environment
#   docker-compose up --build  # build and start all services
#
# Services: db, redis, cloud (Django), ocpp (Go), nginx (reverse proxy)
# =============================================================================
version: "3.9"

services:

  # ── PostgreSQL ────────────────────────────────────────────────────────────
  db:
    image: postgres:17-alpine
    restart: unless-stopped
    volumes:
      - postgres_data:/var/lib/postgresql/data
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-voltwise}
      POSTGRES_USER: ${POSTGRES_USER:-voltwise}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-voltwise}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-voltwise}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - voltwise

  # ── Redis ─────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - voltwise

  # ── voltwise-cloud (Django + Gunicorn) ───────────────────────────────────
  cloud:
    build:
      context: ..
      dockerfile: voltwise-docker/docker/cloud/Dockerfile
    restart: unless-stopped
    env_file: .env
    environment:
      # Override DB host to point to the db container
      DB_HOST: db
      DB_PORT: "5432"
      REDIS_URL: redis://redis:6379/0
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8000/api/ || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    networks:
      - voltwise
    # Developer profile: mount source code for hot reload
    profiles: ["", "dev"]

  # ── voltwise-ocpp (Go WebSocket server) ──────────────────────────────────
  ocpp:
    build:
      context: ..
      dockerfile: voltwise-docker/docker/ocpp/Dockerfile
    restart: unless-stopped
    environment:
      OCPP_ADDR: ":8080"
      OCPP_LOG: ${OCPP_LOG:-info}
      INTERNAL_API_KEY: ${INTERNAL_API_KEY}
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/healthz || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 5s
    networks:
      - voltwise

  # ── Nginx (reverse proxy) ─────────────────────────────────────────────────
  nginx:
    image: nginx:1.27-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./docker/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      # Mount SSL certs here when ready:
      # - ./docker/nginx/certs:/etc/nginx/certs:ro
    depends_on:
      cloud:
        condition: service_healthy
      ocpp:
        condition: service_healthy
    networks:
      - voltwise

# =============================================================================
# Volumes & Networks
# =============================================================================
volumes:
  postgres_data:
  redis_data:

networks:
  voltwise:
    driver: bridge
