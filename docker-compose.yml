# =============================================================================
# VoltWise — Docker Compose
#
# Usage:
#   cp .env.example .env      # configure environment
#   docker-compose up --build  # build and start all services
#
# Services: db, redis, cloud (Django), ocpp (Go), nginx (reverse proxy)
# =============================================================================
version: "3.9"

services:

  # ── Redis ─────────────────────────────────────────────────────────────────
  voltwise-redis:
    image: redis:7-alpine
    container_name: voltwise-redis
    restart: unless-stopped
    volumes:
      - voltwise_redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - infra-network

  # ── voltwise-cloud (Django + Gunicorn) ───────────────────────────────────
  voltwise-cloud:
    build:
      context: ..
      dockerfile: voltwise-docker/docker/cloud/Dockerfile
    container_name: voltwise-cloud
    restart: unless-stopped
    env_file: .env
    environment:
      # Lendo as configurações do banco de dados diretamente do .env (Digital Ocean)
      REDIS_URL: redis://voltwise-redis:6379/0
    depends_on:
      voltwise-redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8000/api/ || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    networks:
      - infra-network
    # Developer profile: mount source code for hot reload
    profiles: ["", "dev"]

  # ── voltwise-ocpp (Go WebSocket server) ──────────────────────────────────
  voltwise-ocpp:
    build:
      context: ..
      dockerfile: voltwise-docker/docker/ocpp/Dockerfile
    container_name: voltwise-ocpp
    restart: unless-stopped
    environment:
      OCPP_ADDR: ":8080"
      OCPP_LOG: ${OCPP_LOG:-info}
      INTERNAL_API_KEY: ${INTERNAL_API_KEY}
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/healthz || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 5s
    networks:
      - infra-network

  # ── Nginx (reverse proxy) ─────────────────────────────────────────────────
  voltwise-nginx:
    image: nginx:1.27-alpine
    container_name: voltwise-nginx
    restart: unless-stopped
    # Portas públicas não são necessárias pois o NPM está na mesma rede 'infra-network'
    # e acessa 'http://voltwise-nginx:80' diretamente para gerenciar o roteamento interno.
    # ports:
    #   - "80:80"
    #   - "443:443"
    volumes:
      - ./docker/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      voltwise-cloud:
        condition: service_healthy
      voltwise-ocpp:
        condition: service_healthy
    networks:
      - infra-network

# =============================================================================
# Volumes & Networks
# =============================================================================
volumes:
  voltwise_redis_data:

networks:
  infra-network:
    external: true
